name: test_count_with_demos
wandb_enabled: false
loader:
  source: agentflow/test/data/test_data_count.json
  kwargs:
    image_dir: agentflow/test/data/images
models:
  gemma:
    cls: openai
    base_url: "http://0.0.0.0:8000/v1"
    token: "-"
    model_id: google/gemma-3-27b-it
demo_pools:
  count_pool:
    source: agentflow/test/data/demo_pool_count.json
    image_dir: agentflow/test/data/images
stages:
  - inputs:
      - [Image, human]
    output: CountOutput
    processor: LLMProcessor
    model: gemma
    demo:
      pool: count_pool
      select: random
      shots: 3
