name: test_openai_caption
wandb_enabled: false
loader:
  source: agentflow/test/data/test_data.json
  kwargs:
    image_dir: agentflow/test/data/images
models:
  openai:
    cls: openai
    base_url: "https://khoi-ai.openai.azure.com/openai/v1/"
    token: "${OPENAI_API_KEY}"
    model_id: gpt-4o
stages:
  - inputs:
      - [Image, human]
    output: SampleOutput
    processor: LLMProcessor
    model: openai
